<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESign · 08 Templates &amp; Contacts</title>

<link rel="stylesheet" href="../assets/paraph.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: var(--font-sans); color: var(--color-ink); -webkit-font-smoothing: antialiased; }
  [data-lucide] { stroke-width: 1.5; }
</style>
</head>
<body>

<div id="root"></div>

<!-- Auth atoms (Button, Input, Field, Avatar, TagChip, Toast, Stepper, Wordmark) -->
<script type="text/babel" src="auth/atoms.jsx"></script>
<!-- Documents atoms (AppShell, TopNav, PageHeader, Table, IconButton, DropdownTrigger, Dialog, Tabs, Pagination, StatusBadge, AvatarStack, PdfThumb, SIGNER_COLORS) -->
<script type="text/babel" src="documents/atoms.jsx"></script>
<!-- Documents frames — for RowKebab + RowCheckbox reused by the contacts table -->
<script type="text/babel" src="documents/frames.jsx"></script>
<!-- Editor atoms (EditorLayout, EditorTopBar, SidebarSection, SignerBlock, FieldTypeGrid, PlacedField, PdfPage, ContractPage1/2, TagInput) -->
<script type="text/babel" src="editor/atoms.jsx"></script>
<!-- Editor frames — for PdfCanvas helper used by the template editor -->
<script type="text/babel" src="editor/frames.jsx"></script>
<!-- Templates & Contacts atoms -->
<script type="text/babel" src="templates/atoms.jsx"></script>
<!-- Templates & Contacts frames -->
<script type="text/babel" src="templates/frames.jsx"></script>
<!-- Design canvas host -->
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
function Page() {
  React.useEffect(() => {
    const tick = () => window.lucide && window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
    tick();
    const id = setInterval(tick, 600);
    return () => clearInterval(id);
  }, []);

  const FRAME_W = 1440;

  return (
    <DesignCanvas
      title="08 — Templates &amp; Contacts"
      subtitle="Reusable documents · address book · CSV import · add contact"
    >
      <DCSection
        id="templates"
        title="01 · Templates"
        subtitle="Library of reusable documents with pre-placed fields and signer roles. Editor mirrors page 05 with Save-as-Template replacing Send."
      >
        <DCArtboard id="tpl-list" label="08.01 Templates · list" width={FRAME_W} height={900}>
          <TemplatesListFrame />
        </DCArtboard>
        <DCArtboard id="tpl-editor" label="08.02 Templates · editor" width={FRAME_W} height={900}>
          <TemplatesEditorFrame />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="contacts"
        title="02 · Contacts"
        subtitle="Address book — 240w Groups sidebar + table of people. CSV import dialog handles bulk uploads in three steps."
      >
        <DCArtboard id="contacts-list" label="08.03 Contacts · list" width={FRAME_W} height={900}>
          <ContactsListFrame />
        </DCArtboard>
        <DCArtboard id="contacts-csv" label="08.04 Contacts · CSV import (md)" width={FRAME_W} height={900}>
          <CsvImportDialogFrame />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="annotations"
        title="03 · Annotations"
        subtitle="Small-dialog inline form for adding a single contact."
      >
        <DCArtboard id="anno-add-contact" label="Anno · Add Contact dialog (sm)" width={640} height={700}>
          <AddContactDialogAnno />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
