<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ESign · 07 Dashboard</title>

<link rel="stylesheet" href="../assets/paraph.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.js"></script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: var(--font-sans); color: var(--color-ink); -webkit-font-smoothing: antialiased; }
  [data-lucide] { stroke-width: 1.5; }
</style>
</head>
<body>

<div id="root"></div>

<!-- Auth atoms (shared: Button, Avatar, TagChip, Wordmark, etc) -->
<script type="text/babel" src="auth/atoms.jsx"></script>
<!-- Documents atoms (AppShell, StatusBadge, AvatarStack, PdfThumb, Table, IconButton, EmptyState, etc) -->
<script type="text/babel" src="documents/atoms.jsx"></script>
<!-- Documents frames — for RowKebab + RowCheckbox used by drill-down table -->
<script type="text/babel" src="documents/frames.jsx"></script>
<!-- Dashboard atoms -->
<script type="text/babel" src="dashboard/atoms.jsx"></script>
<!-- Dashboard frames -->
<script type="text/babel" src="dashboard/frames.jsx"></script>
<!-- Design canvas host -->
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
function Page() {
  React.useEffect(() => {
    const tick = () => window.lucide && window.lucide.createIcons({ attrs: { 'stroke-width': 1.5 } });
    tick();
    const id = setInterval(tick, 600);
    return () => clearInterval(id);
  }, []);

  const FRAME_W = 1440;

  return (
    <DesignCanvas
      title="07 — Dashboard"
      subtitle="Workspace analytics · App Shell 1440 · Dashboard tab"
    >
      <DCSection
        id="main"
        title="01 · Dashboard · main"
        subtitle="Default 30-day view. KPI strip · Sending Volume + Status Breakdown · Recent Activity feed."
      >
        <DCArtboard id="dash-main" label="07.01 Dashboard · main" width={FRAME_W} height={1140}>
          <DashboardMainFrame />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="empty"
        title="02 · Dashboard · empty / first-time"
        subtitle="Pre-data state. KPI placeholders are dashed; empty-state card invites the first upload."
      >
        <DCArtboard id="dash-empty" label="07.02 Dashboard · empty" width={FRAME_W} height={900}>
          <DashboardEmptyFrame />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="drilldown"
        title="03 · Dashboard · status drill-down"
        subtitle="User clicked the “Pending” slice. Donut emphasises Pending, others dim. The activity feed is replaced by a filtered pending-only Table."
      >
        <DCArtboard id="dash-drilldown" label="07.03 Dashboard · Pending drill-down" width={FRAME_W} height={1320}>
          <DashboardDrilldownFrame />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Page />);
</script>
</body>
</html>
